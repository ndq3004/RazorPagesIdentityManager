<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>OIDC Test Client</title>
</head>
<body>
  <h2>OIDC Test Client</h2>
  <button id="loginBtn">Login with Auth Server</button>

  <script>
    const authority = "https://localhost:7203";
    const clientId = "simple-spa-test";
    const redirectUri = "http://localhost:5500/callback.html";
    const scope = "openid profile email";

    function base64UrlEncode(bytes) {
      let str = btoa(String.fromCharCode(...bytes));
      return str.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }

    async function sha256(text) {
      const data = new TextEncoder().encode(text);
      const hash = await crypto.subtle.digest("SHA-256", data);
      return new Uint8Array(hash);
    }

    function randomString(length = 64) {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~";
      let result = "";
      const rnd = crypto.getRandomValues(new Uint8Array(length));
      for (let i = 0; i < length; i++) result += chars[rnd[i] % chars.length];
      return result;
    }

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const codeVerifier = randomString(64);
      const challengeBytes = await sha256(codeVerifier);
      const codeChallenge = base64UrlEncode(challengeBytes);
      const state = randomString(32);
      const nonce = randomString(32);

      sessionStorage.setItem("pkce_code_verifier", codeVerifier);
      sessionStorage.setItem("oauth_state", state);
      sessionStorage.setItem("oauth_nonce", nonce);

      const authorizeUrl = new URL(authority + "/connect/authorize");
      authorizeUrl.searchParams.set("client_id", clientId);
      authorizeUrl.searchParams.set("response_type", "code");
      authorizeUrl.searchParams.set("redirect_uri", redirectUri);
      authorizeUrl.searchParams.set("scope", scope);
      authorizeUrl.searchParams.set("code_challenge", codeChallenge);
      authorizeUrl.searchParams.set("code_challenge_method", "S256");
      authorizeUrl.searchParams.set("state", state);
      authorizeUrl.searchParams.set("nonce", nonce);
      debugger
      window.location.href = authorizeUrl.toString();
    });
  </script>
</body>
</html>
